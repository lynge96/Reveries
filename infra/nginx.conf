events {}

http {
    server {
        listen 80;
        server_name raspberrypi;

        # Bookscanner: raspberrypi/scanner -> :8081
        location /scanner {
            proxy_pass http://bookscanner:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API: raspberrypi/api -> :8080
        location /api {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Grafana: raspberrypi/grafana -> :3000
        location /grafana {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }
    }
}