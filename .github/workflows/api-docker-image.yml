name: CI/CD - API Docker Image

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'src/Reveries.Blazor.BookScanner/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/bookscanner-docker-image.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'src/Reveries.Blazor.BookScanner/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  # Job 1: Run all unit tests
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build solution
        run: dotnet build --no-restore --configuration Release
      
      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
      
      - name: Test results
        if: always()
        run: echo "✅ All tests completed"
        
  # Job 2: Build and push Docker image (if tests pass)
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      # 1. Checkout Source Code
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history for better caching/context

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Extract metadata
      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

          # Determine branch name and tags
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "BRANCH_TAG=latest" >> "$GITHUB_OUTPUT"
          else
            BRANCH_NAME=$(echo ${{ github.ref }} | sed 's/refs\/heads\///' | sed 's/\//-/g')
            echo "BRANCH_TAG=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          fi

      # 4. Login to Docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and push image
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Reveries.Api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/reveries-api:${{ steps.meta.outputs.BRANCH_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Output image information
      - name: Image information
        run: |
          echo "✅ Docker image built successfully!"
          echo "📦 Repository: ${{ secrets.DOCKERHUB_USERNAME }}/reveries-api"
          echo "🏷️  Tags:"
          echo "   - ${{ steps.meta.outputs.BRANCH_TAG }}"

          
